name: Validate and deploy architecture site

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/ego/tui/state.py"
      - "tests/test_architecture_site.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/ego/tui/state.py"
      - "tests/test_architecture_site.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install locked development dependencies
        run: uv sync --frozen --dev

      - name: Validate architecture content and local links
        run: uv run pytest tests/test_architecture_site.py

      - name: Validate JavaScript syntax
        run: node --check docs/assets/architecture.js

  package:
    name: Package GitHub Pages artifact
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
